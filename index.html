<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevBoard Kanban</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .column-min-height { min-height: calc(100vh - 250px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 overflow-hidden">
    <div id="loader" class="loading-overlay">
        <div class="flex flex-col items-center gap-4">
            <div class="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin"></div>
            <p class="text-slate-500 font-medium animate-pulse">Synchronisation...</p>
        </div>
    </div>

    <div id="app" class="flex h-screen opacity-0 transition-opacity duration-500">
        <!-- Sidebar -->
        <aside class="w-64 bg-white border-r border-slate-200 flex flex-col hidden md:flex">
            <div class="p-6 border-b border-slate-100">
                <div class="flex items-center gap-2 font-bold text-xl text-indigo-600">
                    <i data-lucide="layout" class="w-6 h-6"></i>
                    <span>DevBoard</span>
                </div>
            </div>
            <div class="flex-1 overflow-y-auto p-4 space-y-6">
                <div>
                    <h3 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4 px-2">Projets</h3>
                    <div id="project-list" class="space-y-1"></div>
                    <button onclick="addNewProject()" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm text-slate-400 hover:bg-slate-50 border border-dashed border-slate-200 mt-2">
                        <i data-lucide="plus" class="w-4 h-4"></i>
                        <span>Nouveau projet</span>
                    </button>
                </div>
            </div>
            <div class="p-4 border-t border-slate-100">
                <div class="flex items-center gap-3 p-2 rounded-lg bg-slate-100">
                    <div id="user-initials" class="w-8 h-8 rounded-full bg-indigo-500 flex items-center justify-center text-white text-[10px] font-bold">...</div>
                    <div class="flex-1 overflow-hidden">
                        <p class="text-sm font-medium truncate">Utilisateur</p>
                        <p id="user-id-display" class="text-[10px] text-slate-500 truncate">Connexion...</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-16 bg-white border-b border-slate-200 px-4 md:px-8 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <h2 id="active-project-name" class="text-lg font-semibold truncate max-w-[150px] md:max-w-none">Chargement...</h2>
                    <div class="h-4 w-[1px] bg-slate-200 hidden sm:block"></div>
                    <div class="relative hidden sm:block">
                        <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                        <input type="text" id="search-input" placeholder="Rechercher..." class="pl-10 pr-4 py-1.5 bg-slate-100 rounded-full text-sm border-none focus:ring-2 focus:ring-indigo-500 w-48 lg:w-64">
                    </div>
                </div>
                <button onclick="openModal()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg text-sm font-medium flex items-center gap-2 transition-colors shadow-sm whitespace-nowrap">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Créer un ticket</span>
                    <span class="sm:hidden">Ticket</span>
                </button>
            </header>

            <div class="flex-1 overflow-x-auto p-4 md:p-8">
                <div id="kanban-board" class="flex gap-6 h-full min-w-max pb-4"></div>
            </div>
        </main>
    </div>

    <!-- Modal Task -->
    <div id="modal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-50 p-4 hidden">
        <div class="bg-white rounded-2xl shadow-xl w-full max-w-lg overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                <h3 id="modal-title" class="font-bold text-lg">Nouveau ticket</h3>
                <button onclick="closeModal()" class="text-slate-400 hover:text-slate-600 p-1">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <form id="task-form" class="p-6 space-y-4">
                <input type="hidden" id="edit-id">
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Titre</label>
                    <input id="task-title" required class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Description</label>
                    <textarea id="task-desc" rows="3" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none resize-none"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Status</label>
                        <select id="task-status" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="todo">À faire</option>
                            <option value="in-progress">En cours</option>
                            <option value="review">Revue</option>
                            <option value="done">Terminé</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Priorité</label>
                        <select id="task-priority" class="w-full px-4 py-2 border border-slate-200 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                            <option value="low">Faible</option>
                            <option value="medium">Moyenne</option>
                            <option value="high">Haute</option>
                            <option value="urgent">Urgent</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-500 uppercase mb-1">Type</label>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="type" value="task" checked> <span class="text-sm">🛠 Task</span></label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="type" value="bug"> <span class="text-sm">🐛 Bug</span></label>
                        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="type" value="feature"> <span class="text-sm">⚡ Feature</span></label>
                    </div>
                </div>
                <div class="pt-4 flex justify-between border-t border-slate-100">
                    <button type="button" id="delete-btn" onclick="deleteCurrentTask()" class="text-red-500 hover:bg-red-50 px-4 py-2 rounded-lg text-sm font-medium hidden">Supprimer</button>
                    <div class="flex gap-2 ml-auto">
                        <button type="button" onclick="closeModal()" class="px-4 py-2 text-slate-600 hover:bg-slate-100 rounded-lg text-sm font-medium">Annuler</button>
                        <button type="submit" class="px-6 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-medium shadow-sm">Enregistrer</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot, query, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Configuration & Initialization ---
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'devboard-kanban-default';

        // --- State ---
        let projects = [];
        let tasks = [];
        let activeProjectId = null;
        let searchTerm = '';
        let currentUser = null;

        const columns = [
            { id: 'todo', title: 'À faire', color: 'bg-slate-100', icon: 'circle' },
            { id: 'in-progress', title: 'En cours', color: 'bg-blue-50', icon: 'clock' },
            { id: 'review', title: 'Revue', color: 'bg-purple-50', icon: 'search' },
            { id: 'done', title: 'Terminé', color: 'bg-green-50', icon: 'check-circle' },
        ];

        // --- Auth Implementation ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Erreur d'authentification", error);
            }
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-id-display').innerText = user.uid;
                document.getElementById('user-initials').innerText = user.uid.substring(0, 2).toUpperCase();
                setupDataListeners();
            }
        });

        // --- Data Listeners ---
        const setupDataListeners = () => {
            if (!currentUser) return;

            // Projects Listener
            const projectsRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'projects');
            onSnapshot(projectsRef, (snapshot) => {
                projects = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                
                // Ensure there is always a default project
                if (projects.length === 0) {
                    createInitialProject();
                } else {
                    if (!activeProjectId) activeProjectId = projects[0].id;
                    render();
                    checkLoadingStatus();
                }
            }, (error) => console.error("Projets error:", error));

            // Tasks Listener
            const tasksRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks');
            onSnapshot(tasksRef, (snapshot) => {
                tasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                render();
            }, (error) => console.error("Tâches error:", error));
        };

        const createInitialProject = async () => {
            const projectRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'projects');
            await addDoc(projectRef, { name: 'Mon premier projet', icon: '🚀' });
        };

        const checkLoadingStatus = () => {
            const loader = document.getElementById('loader');
            const appDiv = document.getElementById('app');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.remove(), 500);
                appDiv.classList.remove('opacity-0');
            }
        };

        // --- Rendering Logic ---
        window.render = () => {
            // Render Projects
            const projectList = document.getElementById('project-list');
            projectList.innerHTML = projects.map(p => `
                <button onclick="setActiveProject('${p.id}')" class="w-full flex items-center gap-3 px-3 py-2 rounded-lg text-sm transition-colors ${activeProjectId === p.id ? 'bg-indigo-50 text-indigo-700 font-medium' : 'text-slate-600 hover:bg-slate-50'}">
                    <span>${p.icon || '📁'}</span>
                    <span class="truncate">${p.name}</span>
                </button>
            `).join('');

            const activeProject = projects.find(p => p.id === activeProjectId);
            document.getElementById('active-project-name').innerText = activeProject ? activeProject.name : "Sélectionnez un projet";

            // Render Board
            const board = document.getElementById('kanban-board');
            if (!activeProjectId) {
                board.innerHTML = '<div class="w-full flex justify-center py-20 text-slate-400">Veuillez sélectionner un projet</div>';
                return;
            }

            const filteredTasks = tasks.filter(t => 
                t.projectId === activeProjectId && 
                (t.title.toLowerCase().includes(searchTerm.toLowerCase()) || (t.description || '').toLowerCase().includes(searchTerm.toLowerCase()))
            );

            board.innerHTML = columns.map(col => {
                const colTasks = filteredTasks.filter(t => t.status === col.id);
                return `
                    <div class="w-72 md:w-80 flex flex-col h-full group">
                        <div class="flex items-center justify-between mb-4 px-2">
                            <div class="flex items-center gap-2">
                                <i data-lucide="${col.icon}" class="w-4 h-4 ${col.id === 'done' ? 'text-green-500' : col.id === 'in-progress' ? 'text-blue-500' : 'text-slate-500'}"></i>
                                <h3 class="font-semibold text-slate-700 text-sm">${col.title}</h3>
                                <span class="text-[10px] font-bold bg-slate-200 text-slate-600 px-2 py-0.5 rounded-full">${colTasks.length}</span>
                            </div>
                        </div>
                        <div class="flex-1 rounded-xl p-2 transition-colors ${col.color} border-2 border-transparent hover:border-slate-200 overflow-y-auto space-y-3 custom-scrollbar column-min-height">
                            ${colTasks.map(task => `
                                <div onclick="openEditModal('${task.id}')" class="bg-white p-4 rounded-lg shadow-sm border border-slate-200 hover:border-indigo-300 cursor-pointer transition-all hover:shadow-md group/card">
                                    <div class="flex justify-between items-start mb-2">
                                        <span class="text-[10px] font-bold uppercase px-2 py-0.5 rounded border ${getPriorityClass(task.priority)}">${task.priority}</span>
                                        ${getTypeIcon(task.type)}
                                    </div>
                                    <h4 class="font-semibold text-slate-800 text-sm mb-1 leading-tight">${task.title}</h4>
                                    <p class="text-xs text-slate-500 line-clamp-2 mb-3">${task.description || 'Pas de description'}</p>
                                    <div class="flex items-center justify-between pt-3 border-t border-slate-50">
                                        <div class="w-6 h-6 rounded-full bg-indigo-100 border border-white flex items-center justify-center text-[10px] font-bold text-indigo-600">JD</div>
                                        <button onclick="event.stopPropagation(); moveTaskForward('${task.id}')" class="p-1 hover:bg-slate-100 rounded text-slate-400 hover:text-indigo-600 transition-colors">
                                            <i data-lucide="chevron-right" class="w-4 h-4"></i>
                                        </button>
                                    </div>
                                </div>
                            `).join('')}
                            ${colTasks.length === 0 ? '<div class="h-24 border-2 border-dashed border-slate-300 rounded-lg flex items-center justify-center text-slate-400 text-xs italic">Vide</div>' : ''}
                        </div>
                    </div>
                `;
            }).join('');

            if (window.lucide) lucide.createIcons();
        };

        // --- Helpers ---
        function getPriorityClass(p) {
            if (p === 'urgent') return 'bg-red-50 text-red-700 border-red-100';
            if (p === 'high') return 'bg-orange-50 text-orange-700 border-orange-100';
            if (p === 'medium') return 'bg-yellow-50 text-yellow-700 border-yellow-100';
            return 'bg-blue-50 text-blue-700 border-blue-100';
        }

        function getTypeIcon(type) {
            if (type === 'bug') return '<i data-lucide="bug" class="w-3.5 h-3.5 text-red-500"></i>';
            if (type === 'feature') return '<i data-lucide="zap" class="w-3.5 h-3.5 text-yellow-500"></i>';
            return '<i data-lucide="code" class="w-3.5 h-3.5 text-blue-500"></i>';
        }

        // --- Global Actions ---
        window.setActiveProject = (id) => { activeProjectId = id; render(); };
        
        window.moveTaskForward = async (id) => {
            if (!currentUser) return;
            const task = tasks.find(t => t.id === id);
            const currentIndex = columns.findIndex(c => c.id === task.status);
            const nextStatus = columns[(currentIndex + 1) % 4].id;
            
            const taskRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', id);
            await updateDoc(taskRef, { status: nextStatus });
        };

        window.addNewProject = async () => {
            const name = prompt("Nom du projet :");
            if (name && currentUser) {
                const projectsRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'projects');
                const docRef = await addDoc(projectsRef, { name, icon: '📂' });
                activeProjectId = docRef.id;
            }
        };

        // --- Modal Logic ---
        window.openModal = () => {
            document.getElementById('edit-id').value = '';
            document.getElementById('task-form').reset();
            document.getElementById('modal-title').innerText = 'Nouveau ticket';
            document.getElementById('delete-btn').classList.add('hidden');
            document.getElementById('modal').classList.remove('hidden');
        };

        window.openEditModal = (id) => {
            const task = tasks.find(t => t.id === id);
            if (!task) return;
            document.getElementById('edit-id').value = task.id;
            document.getElementById('task-title').value = task.title;
            document.getElementById('task-desc').value = task.description || '';
            document.getElementById('task-status').value = task.status;
            document.getElementById('task-priority').value = task.priority;
            const typeRadio = document.querySelector(`input[name="type"][value="${task.type}"]`);
            if (typeRadio) typeRadio.checked = true;
            
            document.getElementById('modal-title').innerText = 'Modifier le ticket';
            document.getElementById('delete-btn').classList.remove('hidden');
            document.getElementById('modal').classList.remove('hidden');
        };

        window.closeModal = () => { document.getElementById('modal').classList.add('hidden'); };

        window.deleteCurrentTask = async () => {
            const id = document.getElementById('edit-id').value;
            if (id && currentUser && confirm("Supprimer ce ticket ?")) {
                const taskRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', id);
                await deleteDoc(taskRef);
                closeModal();
            }
        };

        document.getElementById('task-form').onsubmit = async (e) => {
            e.preventDefault();
            if (!currentUser || !activeProjectId) return;

            const id = document.getElementById('edit-id').value;
            const taskData = {
                projectId: activeProjectId,
                title: document.getElementById('task-title').value,
                description: document.getElementById('task-desc').value,
                status: document.getElementById('task-status').value,
                priority: document.getElementById('task-priority').value,
                type: document.querySelector('input[name="type"]:checked').value
            };

            if (id) {
                const taskRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', id);
                await updateDoc(taskRef, taskData);
            } else {
                const tasksRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks');
                await addDoc(tasksRef, taskData);
            }
            closeModal();
        };

        document.getElementById('search-input').oninput = (e) => {
            searchTerm = e.target.value;
            render();
        };

        // Boot
        initAuth();
    </script>
</body>
</html>
